name: Validate Helm chart

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/validate-chart.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4
        with:
          version: "v3.16.0"

      - name: Update chart dependencies
        run: helm dependency update charts/monstera/

      - name: Lint chart
        run: helm lint charts/monstera/

      - name: Template chart
        run: helm template release charts/monstera/ -f charts/monstera/ci-values.yaml
