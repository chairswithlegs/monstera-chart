{{- if and (eq .Values.media.driver "local") .Values.media.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "monstera.server.mediaPvcName" . }}
  labels:
    {{- include "monstera.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.media.persistence.size | default "10Gi" }}
  {{- if .Values.media.persistence.storageClass }}
  storageClassName: {{ .Values.media.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
