apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monstera.ui.fullname" . }}
  labels:
    {{- include "monstera.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "monstera.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "monstera.labels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: ui
          image: {{ include "monstera.ui.image" . }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /usr/share/nginx/html/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "monstera.ui.fullname" . }}-config
