{{- if .Values.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "monstera.fullname" . }}-migrate
  labels:
    {{- include "monstera.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "monstera.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ include "monstera.server.image" . }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command:
            - /server
            - migrate
            - up
          envFrom:
            - secretRef:
                name: {{ .Values.server.existingSecret | quote }}
{{- end }}
