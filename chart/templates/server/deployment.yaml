apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monstera.server.fullname" . }}
  labels:
    {{- include "monstera.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "monstera.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "monstera.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: server
          image: {{ include "monstera.server.image" . }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command:
            - /server
            - serve
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - secretRef:
                name: {{ .Values.server.existingSecret | quote }}
          {{- if .Values.server.extraEnv }}
          env:
            {{- toYaml .Values.server.extraEnv | nindent 12 }}
          {{- end }}
          {{- if and (eq .Values.media.driver "local") .Values.media.persistence.enabled }}
          volumeMounts:
            - name: media
              mountPath: {{ .Values.media.localPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
      {{- if and (eq .Values.media.driver "local") .Values.media.persistence.enabled }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "monstera.server.mediaPvcName" . }}
      {{- end }}
