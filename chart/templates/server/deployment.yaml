apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monstera.server.fullname" . }}
  labels:
    {{- include "monstera.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "monstera.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "monstera.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: server
          image: {{ include "monstera.server.image" . }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command:
            - /server
            - serve
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - secretRef:
                name: {{ .Values.server.existingSecret | quote }}
          env:
            - name: INSTANCE_NAME
              value: {{ .Values.instanceName | quote }}
            - name: MONSTERA_INSTANCE_DOMAIN
              value: {{ .Values.instanceDomain | quote }}
            - name: APP_ENV
              value: {{ .Values.appEnv | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: MONSTERA_UI_URL
              value: {{ include "monstera.ui.url" . | quote }}
            - name: MONSTERA_SERVER_URL
              value: {{ .Values.server.url | quote }}
            - name: CACHE_DRIVER
              value: memory
            - name: DATABASE_HOST
              value: {{ include "monstera.db.host" . | quote }}
            - name: DATABASE_PORT
              value: {{ .Values.database.port | quote }}
            - name: DATABASE_NAME
              value: {{ .Values.database.name | quote }}
            {{- if .Values.nats.enabled }}
            - name: NATS_URL
              value: {{ include "monstera.nats.url" . | quote }}
            {{- end }}
            - name: MEDIA_DRIVER
              value: {{ .Values.media.driver | quote }}
            - name: MEDIA_BASE_URL
              value: {{ .Values.media.baseUrl | quote }}
            - name: MEDIA_MAX_BYTES
              value: {{ .Values.media.maxBytes | quote }}
            {{- if .Values.media.cdnBase }}
            - name: MEDIA_CDN_BASE
              value: {{ .Values.media.cdnBase | quote }}
            {{- end }}
            {{- if eq .Values.media.driver "local" }}
            - name: MEDIA_LOCAL_PATH
              value: {{ .Values.media.localPath | quote }}
            {{- else if eq .Values.media.driver "s3" }}
            - name: MEDIA_S3_BUCKET
              value: {{ required "media.s3.bucket is required when media.driver is s3" .Values.media.s3.bucket | quote }}
            - name: MEDIA_S3_REGION
              value: {{ required "media.s3.region is required when media.driver is s3" .Values.media.s3.region | quote }}
            {{- if .Values.media.s3.endpoint }}
            - name: MEDIA_S3_ENDPOINT
              value: {{ .Values.media.s3.endpoint | quote }}
            {{- end }}
            {{- end }}
            - name: EMAIL_DRIVER
              value: {{ .Values.email.driver | quote }}
            - name: EMAIL_FROM
              value: {{ .Values.email.from | quote }}
            - name: EMAIL_FROM_NAME
              value: {{ .Values.email.fromName | quote }}
            {{- if eq .Values.email.driver "smtp" }}
            - name: EMAIL_SMTP_HOST
              value: {{ required "email.smtp.host is required when email.driver is smtp" .Values.email.smtp.host | quote }}
            - name: EMAIL_SMTP_PORT
              value: {{ .Values.email.smtp.port | quote }}
            {{- end }}
            - name: FEDERATION_WORKER_CONCURRENCY
              value: {{ .Values.federation.workerConcurrency | quote }}
            {{- if .Values.push.vapidPublicKey }}
            - name: VAPID_PUBLIC_KEY
              value: {{ .Values.push.vapidPublicKey | quote }}
            {{- end }}
            - name: MAX_STATUS_CHARS
              value: {{ .Values.limits.maxStatusChars | quote }}
            - name: MAX_REQUEST_BODY_BYTES
              value: {{ .Values.limits.maxRequestBodyBytes | quote }}
            - name: RATE_LIMIT_AUTH_PER_WINDOW
              value: {{ .Values.rateLimiting.authPerWindow | quote }}
            - name: RATE_LIMIT_AUTH_WINDOW_SECONDS
              value: {{ .Values.rateLimiting.authWindowSeconds | quote }}
            - name: RATE_LIMIT_PUBLIC_PER_WINDOW
              value: {{ .Values.rateLimiting.publicPerWindow | quote }}
            - name: RATE_LIMIT_PUBLIC_WINDOW_SECONDS
              value: {{ .Values.rateLimiting.publicWindowSeconds | quote }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if and (eq .Values.media.driver "local") .Values.media.persistence.enabled }}
          volumeMounts:
            - name: media
              mountPath: {{ .Values.media.localPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
      {{- if and (eq .Values.media.driver "local") .Values.media.persistence.enabled }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "monstera.server.mediaPvcName" . }}
      {{- end }}
