apiVersion: v2
name: monstera
description: Monstera - self-hosted ActivityPub / Mastodon-compatible server
type: application
version: 0.1.0
keywords:
  - activitypub
  - mastodon
  - fediverse
home: https://github.com/chairswithlegs/monstera
sources:
  - https://github.com/chairswithlegs/monstera
maintainers: []
dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: nats
    version: "2.x.x"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled